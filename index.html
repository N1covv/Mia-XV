<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Mis XV</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <section class="hero">
    <h1 class="index-quince">MIS 15
    </h1>
    <p class="name-index">Mia</p>

    <div class="conteo-section">
      <div class="countdown-box">
        <div class="time">
          <span id="DIAS">00</span>
          <p>DÍAS</p>
        </div>
        <div class="dots">:</div>

        <div class="time">
          <span id="HORAS">00</span>
          <p>HS</p>
        </div>

        <div class="dots">:</div>

        <div class="time">
          <span id="MINUTOS">00</span>
          <p>MIN</p>
        </div>

        <div class="dots">:</div>

        <div class="time">
          <span id="SEGUNDOS">00</span>
          <p>SEG</p>
        </div>
      </div>
    </div>


  </section>

  <section>

    <div class="info">
      <i class="fa-regular fa-calendar"></i>
      <h2 class="title">¿CUÁNDO?</h2>
      <p class="date">16 DE MAYO 2026</p>
      <p class="tiempo">| 21:30 HS |</p>
    </div>
    <div class="where">
      <h2 class="title">¿DONDE?</h2>
      <p class="date">GRISEL EVENTOS</p>
      <p class="date-street">Fabian Onsari 839 - Wilde</p>
      <a href="#" class="btn-quince">
            <span>Ver Maps</span>
        </a>
    </div>
  </section>
  <script src="script.js"></script>
</body>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>


</html>
